name: Build and Push to ECR instance

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    env:
      AWS_REGION: ${{ secrets.AWS_REGION }}
      ECR_BACKEND: aws-try-backend
      ECR_FRONTEND: aws-try-frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Backend Image
        run: |
          docker build \
            -t ${{ steps.login-ecr.outputs.registry }}/aws-try-backend:latest \
            ./backend

      - name: Push Backend Image
        run: |
          docker push \
            ${{ steps.login-ecr.outputs.registry }}/aws-try-backend:latest

      - name: Build Frontend Image
        run: |
          docker build \
            -t ${{ steps.login-ecr.outputs.registry }}/aws-try-frontend:latest \
            ./frontend

      - name: Push Frontend Image
        run: |
          docker push \
            ${{ steps.login-ecr.outputs.registry }}/aws-try-frontend:latest