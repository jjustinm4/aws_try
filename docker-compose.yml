services:
  postgres:
    image: postgres:16-alpine
    container_name: aws_learning_postgres
    environment:
      POSTGRES_DB: aws_learning
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d aws_learning"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    container_name: aws_learning_backend
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - ./backend/uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    container_name: aws_learning_frontend
    env_file:
      - .env
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  postgres_data:
